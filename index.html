<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank Fan</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
            color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10vh;
        }
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header p {
            margin: 0.5rem 0 0 0;
            font-size: 1rem;
            color: #666;
            letter-spacing: 1px;
        }
        .image-container {
            width: 90%;
            max-width: 600px;
        }
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Frank Fan</h1>
        <p>Thinker | Athlete</p>
    </div>
    <div class="image-container">
        <img src="status.png" alt="Frank Fan">
    </div>
</body>
</html>
