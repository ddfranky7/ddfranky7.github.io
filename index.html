<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank Fan</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff; color: #000; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 8vh; padding-bottom: 5vh;
        }
        .header { text-align: center; margin-bottom: 4rem; }
        .header h1 { margin: 0; font-size: 2.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .header p { margin: 0.5rem 0 0 0; font-size: 1rem; color: #666; letter-spacing: 1px; }
        .content-section { width: 90%; max-width: 600px; margin-bottom: 3.5rem; }
        .section-title { 
            font-size: 0.85rem; color: #999; text-transform: uppercase; 
            letter-spacing: 2px; border-bottom: 1px solid #eaeaea; 
            padding-bottom: 0.5rem; margin-bottom: 1.5rem; 
        }
        .image-container img { width: 100%; max-width: 350px; height: auto; display: block; margin: 0 auto; border-radius: 4px; }
        model-viewer {
            width: 100%; height: 400px;
            background-color: #f8f9fa; margin: 0 auto; border: 1px solid #eee;
        }
        .item-description { font-size: 0.95rem; color: #444; margin-bottom: 1rem; line-height: 1.5;}
        
        .suggestion-form { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
        .form-input { 
            width: 100%; padding: 10px 0; border: none; border-bottom: 1px solid #ccc; 
            font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.3s;
        }
        .form-input:focus { border-bottom: 1px solid #000; }
        .submit-btn {
            align-self: flex-start; padding: 8px 20px; background-color: #000; color: #fff;
            border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer; transition: background-color 0.2s;
        }
        .submit-btn:hover { background-color: #333; }

        .footer {
            margin-top: 2rem; text-align: center; border-top: 1px solid #eee;
            padding-top: 2rem; width: 90%; max-width: 600px; font-size: 0.8rem; color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Frank Fan</h1>
        <p>Thinker | Athlete</p>
    </div>
    
    <div class="content-section">
        <div class="section-title">Recents</div>
        <div class="image-container">
            <img src="status.png" alt="Current State">
        </div>
    </div>
    
    <div class="content-section">
        <div class="section-title">un serpent boa qui avale un fauve</div>
        <p class="item-description">Interactive 3D Viewer: home, sweet home.</p>
        <model-viewer 
            src="castle.glb" 
            alt="3D model" 
            auto-rotate 
            camera-controls>
        </model-viewer>
    </div>

    <div class="content-section">
        <div class="section-title">Dialogues</div>
        <p class="item-description">Leave a suggestion or tell me what to build next.</p>
        <form class="suggestion-form" action="https://formspree.io/f/maqppggd" method="POST">
            <input type="text" name="message" class="form-input" placeholder="e.g. I think you could add a ... category" required>
            <button type="submit" class="submit-btn">Send</button>
        </form>
    </div>
    
    <div class="footer">
        Analytics Powered by Enterprise Data Engine (Pending)
    </div>
</body>
</html>
