<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank Fan</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff; color: #000; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 8vh; padding-bottom: 5vh;
        }
        .header { text-align: center; margin-bottom: 4rem; }
        .header h1 { margin: 0; font-size: 2.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .header p { margin: 0.5rem 0 0 0; font-size: 1rem; color: #666; letter-spacing: 1px; }
        .content-section { width: 90%; max-width: 600px; margin-bottom: 3.5rem; }
        .section-title { 
            font-size: 0.85rem; color: #999; text-transform: uppercase; 
            letter-spacing: 2px; border-bottom: 1px solid #eaeaea; 
            padding-bottom: 0.5rem; margin-bottom: 1.5rem; 
        }
        .image-container img { width: 100%; max-width: 350px; height: auto; display: block; margin: 0 auto; border-radius: 4px; }
        model-viewer {
            width: 100%; height: 400px;
            background-color: #f8f9fa; margin: 0 auto; border: 1px solid #eee;
        }
        .item-description { font-size: 0.95rem; color: #444; margin-bottom: 1rem; line-height: 1.5;}
        
        /* 计数器及页脚样式 */
        .footer {
            margin-top: 2rem;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 2rem;
            width: 90%;
            max-width: 600px;
        }
        .footer img { opacity: 0.7; transition: opacity 0.3s; }
        .footer img:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Frank Fan</h1>
        <p>Thinker | Athlete</p>
    </div>
    <div class="content-section">
        <div class="section-title">Recents</div>
        <div class="image-container">
            <img src="status.png" alt="Current State">
        </div>
    </div>
    <div class="content-section">
        <div class="section-title">un serpent boa qui avale un fauve</div>
        <p class="item-description">Interactive 3D Viewer: Surprising Vihelmo.</p>
        <model-viewer 
            src="Surprising_Vihelmo.glb" 
            alt="3D model" 
            auto-rotate 
            camera-controls>
        </model-viewer>
    </div>
    
    <div class="footer">
        <img src="https://visitor-badge.laobi.icu/badge?page_id=ddfranky7.github.io" alt="visitors">
    </div>
</body>
</html>
